# Device Configuration
# This file contains device-specific settings for Modbus communication

[pv_inverter]
# PV Inverter Configuration
ip_address = 192.168.1.100
port = 502
unit_id = 1
protocol = tcp
# Register mapping for common PV inverters (adjust based on your device)
# AC Power (W): Register 40001-40002 (32-bit)
# AC Voltage L1 (V): Register 40003-40004 (32-bit)
# AC Current L1 (A): Register 40005-40006 (32-bit)
# DC Power (W): Register 40009-40010 (32-bit)
# DC Voltage (V): Register 40011-40012 (32-bit)
# Status: Register 40015 (16-bit)
# Temperature (°C): Register 40016 (16-bit)
registers = {
    "ac_power": [40001, 2, "uint32"],
    "ac_voltage": [40003, 2, "uint32"],
    "ac_current": [40005, 2, "uint32"],
    "dc_power": [40009, 2, "uint32"],
    "dc_voltage": [40011, 2, "uint32"],
    "status": [40015, 1, "uint16"],
    "temperature": [40016, 1, "int16"]
}

[genset_controller]
# Genset Controller Configuration
ip_address = 192.168.1.101
port = 502
unit_id = 1
protocol = tcp
# Register mapping for genset controllers
registers = {
    "ac_power": [40001, 2, "uint32"],
    "voltage_l1": [40003, 1, "uint16"],
    "voltage_l2": [40004, 1, "uint16"],
    "voltage_l3": [40005, 1, "uint16"],
    "current_l1": [40006, 1, "uint16"],
    "current_l2": [40007, 1, "uint16"],
    "current_l3": [40008, 1, "uint16"],
    "frequency": [40009, 1, "uint16"],
    "engine_rpm": [40010, 1, "uint16"],
    "engine_temp": [40011, 1, "int16"],
    "oil_pressure": [40012, 1, "uint16"],
    "fuel_level": [40013, 1, "uint16"],
    "run_hours": [40014, 1, "uint16"],
    "status": [40015, 1, "uint16"]
}

[power_meter]
# Power Meter Configuration
ip_address = 192.168.1.102
port = 502
unit_id = 1
protocol = tcp
# Register mapping for power meters
registers = {
    "total_active_power": [40001, 2, "int32"],
    "l1_active_power": [40003, 2, "int32"],
    "l2_active_power": [40005, 2, "int32"],
    "l3_active_power": [40007, 2, "int32"],
    "total_reactive_power": [40009, 2, "int32"],
    "l1_voltage": [40013, 1, "uint16"],
    "l2_voltage": [40014, 1, "uint16"],
    "l3_voltage": [40015, 1, "uint16"],
    "l1_current": [40016, 1, "uint16"],
    "l2_current": [40017, 1, "uint16"],
    "l3_current": [40018, 1, "uint16"],
    "frequency": [40019, 1, "uint16"],
    "power_factor": [40020, 1, "int16"],
    "total_energy_import": [40021, 2, "uint32"],
    "total_energy_export": [40023, 2, "uint32"]
}

[system_settings]
# System-wide settings
max_pv_power = 10000
max_genset_power = 15000
min_spinning_reserve = 2000
max_export_power = 5000
zero_export_enabled = false
load_sharing_enabled = true
fuel_saving_enabled = true
grid_connected_mode = true

# Fuel consumption estimation (liters per kWh)
fuel_consumption_rate = 0.3
fuel_cost_per_liter = 1.5
co2_emission_factor = 0.8

[notifications]
# Email settings
smtp_server = smtp.gmail.com
smtp_port = 587
smtp_username = your_email@gmail.com
smtp_password = your_app_password
email_recipients = ["admin@example.com", "maintenance@example.com"]

# Telegram settings
telegram_bot_token = YOUR_BOT_TOKEN
telegram_chat_ids = ["123456789", "987654321"]

# SMS settings (configure based on your SMS gateway)
sms_gateway_url = https://api.smsgateway.com/send
sms_api_key = YOUR_SMS_API_KEY
sms_recipients = ["+1234567890", "+0987654321"]

[cloud_integration]
# Cloud storage settings
enable_cloud_sync = true
sync_interval_seconds = 300

# AWS S3 (uncomment and configure if using)
# aws_access_key = YOUR_ACCESS_KEY
# aws_secret_key = YOUR_SECRET_KEY
# aws_bucket = pv-monitoring-data
# aws_region = us-east-1

# Google Cloud Storage (uncomment and configure if using)
# gcp_project_id = your-project-id
# gcp_bucket = pv-monitoring-data
# gcp_credentials_path = /path/to/credentials.json

# Azure Blob Storage (uncomment and configure if using)
# azure_account_name = your_account
# azure_account_key = your_key
# azure_container = pv-monitoring-data

# FTP settings
ftp_enabled = false
ftp_host = ftp.example.com
ftp_port = 21
ftp_username = reports_user
ftp_password = password
ftp_remote_path = /reports/

[database]
# Database settings
db_type = sqlite
sqlite_path = ./data/pv_monitoring.db

# MySQL settings (uncomment if using MySQL)
# mysql_host = localhost
# mysql_port = 3306
# mysql_database = pv_monitoring
# mysql_username = pv_user
# mysql_password = password

# InfluxDB settings (uncomment if using InfluxDB)
# influxdb_url = http://localhost:8086
# influxdb_database = pv_monitoring
# influxdb_username = admin
# influxdb_password = password